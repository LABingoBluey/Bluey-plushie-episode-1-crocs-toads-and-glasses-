<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluey Plushie Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <style>
        #player-container {
            width: 100vw;
            height: 100vh;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #player-container ruffle-player {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="h-full bg-black overflow-hidden">

    <div id="player-container">
        <div id="ruffle-mount"></div>
    </div>

    <script>
        window.addEventListener("DOMContentLoaded", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("ruffle-mount");
            container.appendChild(player);

            // Loading the specific SWF file requested
            player.load("blueyplushieep1_crocstoadsandglasses.swf");
        });
    </script>
</body>
</html>
